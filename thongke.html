<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thống kê</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto min-h-screen pb-24">

  <header class="bg-blue-600 text-white p-4 shadow">
    <h1 class="text-2xl font-bold">
      QUÁN ĐIỆN TIẾN
    </h1>

    <p class="text-sm opacity-90">
      Thống kê doanh thu
    </p>
  </header>

  <section class="p-4">

  <div class="bg-white rounded-2xl p-4 shadow">

    <h3 class="font-bold mb-3">
      Bộ lọc thống kê
    </h3>

    <select id="filterType"
            class="w-full border rounded-xl p-3 mb-3">

      <option value="today">Hôm nay</option>
      <option value="month">Tháng này</option>
      <option value="year">Năm nay</option>
      <option value="all">Tất cả</option>

    </select>

    <input id="filterDate"
           type="date"
           class="w-full border rounded-xl p-3 mb-3">

    <input id="filterMonth"
           type="month"
           class="w-full border rounded-xl p-3 mb-3">

    <input id="filterYear"
           type="number"
           placeholder="Nhập năm"
           class="w-full border rounded-xl p-3">

  </div>

</section>

<section class="p-4"><div class="grid grid-cols-2 gap-3"><div class="bg-white rounded-2xl p-4 shadow">
<div class="text-sm text-gray-500">
Hóa đơn
</div><div id="tongHoaDon"
class="text-2xl font-bold">
0
</div>
</div><div class="bg-white rounded-2xl p-4 shadow">
<div class="text-sm text-gray-500">
Doanh thu
</div><div id="tongDoanhThu"
class="text-xl font-bold text-blue-600">
0đ
</div>
</div><div class="bg-white rounded-2xl p-4 shadow">
<div class="text-sm text-gray-500">
Tiền công
</div><div id="tongCong"
class="text-xl font-bold text-green-600">
0đ
</div>
</div><div class="bg-white rounded-2xl p-4 shadow">
<div class="text-sm text-gray-500">
Lợi nhuận
</div><div id="tongLoiNhuan"
class="text-xl font-bold text-red-600">
0đ
</div>
</div></div></section>

<section class="p-4">

  <div class="bg-white rounded-2xl p-4 shadow">

    <h3 class="font-bold mb-3">
      Chi tiết thống kê
    </h3>

    <div id="detailBox"
         class="space-y-2">
    </div>

  </div>

</section>

<section class="px-4">

  <div class="bg-white rounded-2xl p-4 shadow">

    <h3 class="font-bold mb-3">
      Thống kê đơn hàng
    </h3>

    <div class="grid grid-cols-2 gap-3">

      <div class="bg-slate-100 rounded-xl p-3">

        <div class="text-sm text-gray-500">
          Tổng đơn
        </div>

        <div id="tongDon"
             class="text-2xl font-bold">
          0
        </div>

      </div>

      <div class="bg-slate-100 rounded-xl p-3">

        <div class="text-sm text-gray-500">
          Giá trị TB
        </div>

        <div id="giaTriTB"
             class="text-xl font-bold text-blue-600">
          0đ
        </div>

      </div>

    </div>

  </div>

</section>

</div>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg">

  <div class="max-w-md mx-auto grid grid-cols-5 text-center">

    <button onclick="location.href='index.html'" class="p-3">
      🏠<br>Home
    </button>

    <button onclick="location.href='history.html'" class="p-3">
      📄<br>Bill
    </button>

    <button onclick="location.href='kho.html'" class="p-3">
      📦<br>Kho
    </button>

    <button class="p-3 bg-blue-100 text-blue-600 font-bold">
      📊<br>TK
    </button>

    <button onclick="location.href='settings.html'" class="p-3">
      ⚙️<br>Setting
    </button>

  </div>

</nav>

<script src="assets/js/thongke.js"></script>

</body>
</html>
